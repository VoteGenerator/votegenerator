  status = 200

# ============================================================================
# Cache Headers
# ============================================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================================
# Security: Block from search engines (admin pages)
# ============================================================================
[[headers]]
  for = "/admin-support.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/recover.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/dashboard.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin-support"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/recover"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/dashboard"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

 [[headers]]
  for = "/feedback-form"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/youtube-polls"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"   

# ============================================================================
# Security Headers (all pages)
# ============================================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"