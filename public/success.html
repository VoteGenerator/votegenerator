<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - VoteGenerator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center p-4">
  
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    
    <h1 class="text-3xl font-bold text-gray-900 mb-2">Payment Successful!</h1>
    <p class="text-gray-600 mb-6">Thank you for your purchase. You can now create your poll.</p>
    
    <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left">
      <p class="text-sm text-gray-500">Session ID:</p>
      <p id="session-id" class="text-xs text-gray-400 break-all">Loading...</p>
    </div>
    
    <a href="/create.html" class="block w-full py-4 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 transition">
      Create Your Poll Now →
    </a>
    
    <p class="text-sm text-gray-500 mt-4">
      Questions? <a href="/contact.html" class="text-green-600 hover:underline">Contact support</a>
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    document.getElementById('session-id').textContent = sessionId || 'No session ID';
  </script>
</body>
</html>
