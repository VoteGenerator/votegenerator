      if ('caches' in window) {

    <script>
      function acceptCookies(type) {
        var consent = { type: type, timestamp: new Date().toISOString(), version: '1.1' };
        localStorage.setItem('vg_cookie_consent', JSON.stringify(consent));
        document.getElementById('cookie-banner').style.display = 'none';
        if (typeof gtag === 'function') {
          if (type === 'all') {
            gtag('consent', 'update', { 'analytics_storage': 'granted', 'ad_storage': 'granted', 'ad_user_data': 'granted', 'ad_personalization': 'granted' });
            if (typeof window.loadPinterestTag === 'function') { window.loadPinterestTag(); }
          } else {
            gtag('consent', 'update', { 'analytics_storage': 'denied', 'ad_storage': 'denied', 'ad_user_data': 'denied', 'ad_personalization': 'denied' });
          }
        }
      }
      (function() {
        var stored = localStorage.getItem('vg_cookie_consent');
        if (!stored) { document.getElementById('cookie-banner').style.display = 'block'; }
      })();
    </script>
