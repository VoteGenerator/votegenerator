    <!-- Service Worker Registration with cache busting -->
    <script>
      // Clear old caches on page load
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
          }
        });
      }
      
      // Force reload if user has stale version
      window.addEventListener('load', function() {
        if (sessionStorage.getItem('refreshed') !== 'true') {
          sessionStorage.setItem('refreshed', 'true');
        }
      });
      
      // Clear session storage flag when navigating away
      window.addEventListener('beforeunload', function() {
        sessionStorage.removeItem('refreshed');
      });
    </script>

    <script>
      // Cookie consent with Google Consent Mode + Pinterest integration
      function acceptCookies(type) {
        var consent = {
          type: type,
          timestamp: new Date().toISOString(),
          version: '1.1'
        };
        localStorage.setItem('vg_cookie_consent', JSON.stringify(consent));
        
        document.getElementById('cookie-banner').style.display = 'none';
        
        // Update Google Consent Mode
        if (typeof gtag === 'function') {
          if (type === 'all') {
            gtag('consent', 'update', {
              'analytics_storage': 'granted',
              'ad_storage': 'granted',
              'ad_user_data': 'granted',
              'ad_personalization': 'granted'
            });
            // Track the consent event
            gtag('event', 'cookie_consent', { consent_type: 'all' });
            
            // Load Pinterest tag after consent
            if (typeof window.loadPinterestTag === 'function') {
              window.loadPinterestTag();
            }
          } else {
            gtag('consent', 'update', {
              'analytics_storage': 'denied',
              'ad_storage': 'denied',
              'ad_user_data': 'denied',
              'ad_personalization': 'denied'
            });
          }
        }
      }
      
      // Show banner if no consent yet
      (function() {
        var stored = localStorage.getItem('vg_cookie_consent');
        if (!stored) {
          document.getElementById('cookie-banner').style.display = 'block';
        }
      })();
    </script>
