[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ============================================================================
# Scheduled Functions
# ============================================================================
[functions."vg-cleanup-inactive"]
  schedule = "0 3 * * *"

[functions."vg-backup-structure"]
  schedule = "0 9 * * 1"

# ============================================================================
# Stripe API Routes
# ============================================================================
[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200

[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

[[redirects]]
  from = "/api/verify-session"
  to = "/.netlify/functions/verify-session"
  status = 200

[[redirects]]
  from = "/api/dashboard"
  to = "/.netlify/functions/dashboard"
  status = 200

[[redirects]]
  from = "/api/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
