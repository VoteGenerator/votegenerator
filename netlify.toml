[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ============================================================================
# Stripe API Routes
# ============================================================================

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200

[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

[[redirects]]
  from = "/api/verify-session"
  to = "/.netlify/functions/verify-session"
  status = 200

[[redirects]]
  from = "/api/dashboard"
  to = "/.netlify/functions/dashboard"
  status = 200

[[redirects]]
  from = "/api/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/api/recover-purchase"
  to = "/.netlify/functions/recover-purchase"
  status = 200

[[redirects]]
  from = "/api/topup"
  to = "/.netlify/functions/topup"
  status = 200

# ============================================================================
# Email Verification Routes
# ============================================================================

[[redirects]]
  from = "/api/verify/request"
  to = "/.netlify/functions/verify-request"
  status = 200

[[redirects]]
  from = "/api/verify/confirm"
  to = "/.netlify/functions/verify-confirm"
  status = 200

# ============================================================================
# Admin API Routes
# ============================================================================

[[redirects]]
  from = "/api/admin/*"
  to = "/.netlify/functions/admin/:splat"
  status = 200

# ============================================================================
# Main API Routes (polls, votes, etc)
# ============================================================================

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# ============================================================================
# Page Routes
# ============================================================================

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200
  force = true

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "/recover"
  to = "/recover.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin-support"
  to = "/admin-support.html"
  status = 200
  force = true

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/demo"
  to = "/demo.html"
  status = 200

[[redirects]]
  from = "/compare"
  to = "/compare.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/help"
  to = "/help.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/create"
  to = "/create.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

# Poll voting page (public)
[[redirects]]
  from = "/v/:pollId"
  to = "/vote.html"
  status = 200

# Poll admin page
[[redirects]]
  from = "/admin/:pollId/:token"
  to = "/admin.html"
  status = 200

# Custom short links
[[redirects]]
  from = "/p/*"
  to = "/.netlify/functions/short-link"
  status = 200

# ============================================================================
# Cache Headers
# ============================================================================

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================================
# Security: Block from search engines
# ============================================================================

[[headers]]
  for = "/admin-support.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/recover.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/dashboard.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin-support"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/recover"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/dashboard"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ============================================================================
# Security Headers (all pages)
# ============================================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ============================================================================
# SPA Fallback - MUST BE LAST
# ============================================================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

